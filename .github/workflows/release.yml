name: release

# On a main merge or vX.Y.Z tag: build all platform binaries in a clean runner
# and publish a GitHub Release with binaries + SHA256SUMS.
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag from Cargo.toml
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CARGO_V="v$(grep '^version[[:space:]]*=' client/Cargo.toml | head -1 \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "$CARGO_V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_V"
            exit 1
          fi
          release_tag="$CARGO_V"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "::notice::Release $release_tag already exists; skipping publish."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.version.outputs.should_release == 'true'
        run: |
          ./build.sh
          sudo chown -R "$(id -u):$(id -g)" bin

      - name: Package runtime files
        if: steps.version.outputs.should_release == 'true'
        run: |
          tar -czf adtention-terminal-runtime.tar.gz \
            bin/adtention-terminal \
            scripts \
            install.sh \
            install.ps1 \
            README.md
          sha256sum install.sh >> bin/SHA256SUMS
          sha256sum install.ps1 >> bin/SHA256SUMS
          sha256sum adtention-terminal-runtime.tar.gz >> bin/SHA256SUMS

      - name: Publish release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.release_tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.version.outputs.release_tag }}" \
            --notes "Release build from this tag. Verify a download with:
          \`shasum -a 256 -c SHA256SUMS\`" \
            bin/adtention-terminal-darwin-amd64 \
            bin/adtention-terminal-darwin-arm64 \
            bin/adtention-terminal-linux-amd64 \
            bin/adtention-terminal-linux-arm64 \
            bin/adtention-terminal-windows-amd64.exe \
            install.sh \
            install.ps1 \
            adtention-terminal-runtime.tar.gz \
            bin/SHA256SUMS
